<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var l = window.location;
        var hashPath = l.pathname + l.search + l.hash;
        l.replace(l.protocol + "//" + l.host + "/#" + hashPath);
      })();
    </script>
  </head>
  <body></body>
</html>
